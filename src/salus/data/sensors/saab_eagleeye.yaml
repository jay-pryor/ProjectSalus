# SAAB Eagle Eye — X-band mobile air surveillance radar (cUAS adaptation)
# Source: SAAB product materials / Jane's Radar & Electronic Warfare Systems
# Last updated: 2026-04-10
# Note: Eagle Eye is a mobile short-to-medium range air surveillance radar used
#       in various force protection roles including cUAS. Range is against small
#       RCS targets (~0.01 m²); performance against DJI-class targets estimated.

name: SAAB Eagle Eye
type: Radar

max_range_m: 4000.0          # confidence: medium — published range 4 km for small targets in radar specification sheets
min_range_m: 30.0            # confidence: medium — short-range clutter zone; estimated from rotating antenna type
azimuth_coverage_deg: 360.0  # confidence: high — rotating antenna design; full 360° published
elevation_coverage_deg: 30.0 # confidence: medium — medium-elevation air search beam; estimated
elevation_boresight_deg: 5.0 # confidence: medium — slight upward tilt for low-altitude air targets
frequency_bands:             # confidence: high — X-band published for Eagle Eye
  - "9.0 GHz"
requires_los: true           # confidence: high — radar requires direct LOS
mounting_height_m: 4.0       # confidence: medium — vehicle mast deployment; typical elevation
vegetation_penetration: 0.3  # confidence: medium — X-band foliage attenuation estimated
cost_aud: null               # confidence: N/A — not publicly disclosed
