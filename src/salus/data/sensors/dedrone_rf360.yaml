# Dedrone DedroneSensor RF-360 — Passive RF Detection Sensor (with direction finding)
# Source: Dedrone product datasheet / Resources/Sensors/RF/dedrone_rf360.md
# Last updated: 2026-04-12
# Note: Premium variant of the RF-160 with direction-finding capability (+/- 5° accuracy).
#       Classifies 600+ drone models from 150+ manufacturers via DedroneDNA library.
#       Typical detection range 2,000 m; maximum up to 5,000 m.
#       Deployed at 65+ active sites across Australia.

name: Dedrone DedroneSensor RF-360
type: RF

max_range_m: 5000.0          # confidence: medium — datasheet maximum; typical is 2,000 m; highly environment-dependent
min_range_m: 0.0             # confidence: high — passive sensor; no minimum range
azimuth_coverage_deg: 360.0  # confidence: high — omnidirectional with direction finding; datasheet: +/- 5° mean error
elevation_coverage_deg: 90.0 # confidence: medium — hemispherical RF coverage; estimated for passive RF
elevation_boresight_deg: 45.0 # confidence: low — upward-biased for airborne targets; estimated
frequency_bands:             # confidence: medium — dual-radio design; broad ISM band coverage; specific bands not enumerated
  - "2.4 GHz"
  - "5.8 GHz"
requires_los: false          # confidence: high — passive RF; signal diffracts around terrain obstacles
mounting_height_m: 5.0       # confidence: medium — pole/mast mount; typical deployment height
vegetation_penetration: 0.9  # confidence: medium — passive RF at ISM frequencies penetrates vegetation well
cost_aud: null               # confidence: N/A — not publicly disclosed
