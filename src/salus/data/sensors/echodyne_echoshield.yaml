# Echodyne EchoShield — K-band AESA Radar (perimeter cUAS, 360° coverage via 3 panels)
# Source: Echodyne product datasheet / public marketing materials
# Last updated: 2026-04-10
# Note: EchoShield achieves 360° coverage using three 120° panels. Range figures are
#       against DJI Mavic Pro / Phantom 4 class targets (~0.01 m² RCS).

name: Echodyne EchoShield
type: Radar

max_range_m: 1200.0          # confidence: medium — EchoShield positioned as longer-range than EchoGuard; ~1.2 km estimated from published capability claims
min_range_m: 10.0            # confidence: medium — MESA/FMCW type; 10 m estimated, not published
azimuth_coverage_deg: 360.0  # confidence: high — published: 360° full azimuth via 3-panel array
elevation_coverage_deg: 80.0 # confidence: high — same MESA aperture as EchoGuard; 80° published
elevation_boresight_deg: 0.0 # confidence: medium — symmetric around horizontal assumed; not published
frequency_bands:             # confidence: high — same K-band platform as EchoGuard product line
  - "24.55 GHz"
requires_los: true           # confidence: high — radar requires direct LOS to target
mounting_height_m: 5.0       # confidence: medium — typical tripod/mast; not specified in datasheet
vegetation_penetration: 0.4  # confidence: medium — K-band; same attenuation estimate as EchoGuard
cost_aud: null               # confidence: N/A — not publicly disclosed
