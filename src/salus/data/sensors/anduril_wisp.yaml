# Anduril WISP — Panoramic Passive Infrared Sensor (EO/IR)
# Source: Anduril product datasheet / Resources/Sensors/EO_IR/anduril_wisp.md
# Last updated: 2026-03-29
# Note: published detection range is 3–10 miles (5–16 km) for autonomous UAV detection.
#       Conservative lower bound of 5 km used for simulation.

name: Anduril WISP
type: EO_IR

max_range_m: 5000.0          # confidence: medium — published range 5–16 km; using conservative lower bound
min_range_m: 0.0             # confidence: high — passive staring sensor, no transmit blind zone
azimuth_coverage_deg: 360.0  # confidence: high — panoramic coverage published on datasheet
elevation_coverage_deg: 125.0 # confidence: high — published: 125° instantaneous vertical FOV
elevation_boresight_deg: 0.0  # confidence: medium — panoramic staring sensor; horizontal boresight assumed
frequency_bands: []          # confidence: high — passive IR only, no RF transmission
requires_los: true           # confidence: high — optical/IR sensor requires direct line-of-sight
mounting_height_m: 5.0       # confidence: medium — tower/mast mounted; height not specified in datasheet
vegetation_penetration: 0.0  # confidence: high — EO/IR cannot see through foliage; canopy is fully opaque
cost_aud: null               # confidence: N/A — not publicly disclosed
