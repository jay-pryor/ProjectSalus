# Squarehead DiscoverAir — Acoustic Detection Array
# Source: Squarehead Technology product materials / public conference presentations
# Last updated: 2026-04-10
# Note: DiscoverAir is an acoustic array-based UAS detection system that uses
#       beamforming microphone arrays to detect and classify drone acoustic signatures.
#       Detection range is highly dependent on ambient noise levels and rotor type.
#       Figures are for typical outdoor environments with moderate ambient noise.

name: Squarehead DiscoverAir
type: Acoustic

max_range_m: 500.0           # confidence: medium — Squarehead published "up to 500 m" for small multirotor in quiet environments; reduced in high ambient noise
min_range_m: 0.0             # confidence: high — passive acoustic; no minimum range
azimuth_coverage_deg: 360.0  # confidence: high — circular microphone array; 360° coverage published
elevation_coverage_deg: 180.0 # confidence: high — hemispherical acoustic coverage; 180° above horizon
elevation_boresight_deg: 45.0 # confidence: medium — upward-biased coverage for airborne targets
frequency_bands:             # confidence: high — acoustic (infrasound to audible range); not RF bands
  - "20Hz-20kHz"
requires_los: false          # confidence: high — sound diffracts around obstacles; NLOS detection possible
mounting_height_m: 2.0       # confidence: medium — ground-level array mount; typical deployment
vegetation_penetration: 0.7  # confidence: medium — sound attenuates moderately through vegetation; estimated
cost_aud: null               # confidence: N/A — not publicly disclosed
