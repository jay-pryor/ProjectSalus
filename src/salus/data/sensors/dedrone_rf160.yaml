# Dedrone DedroneSensor RF-160 — Passive RF Detection Sensor (detection only, no DF)
# Source: Dedrone product datasheet / Resources/Sensors/RF/dedrone_rf160.md
# Last updated: 2026-04-12
# Note: Lower-cost variant of the RF-360 with no direction-finding capability.
#       Detects and classifies ~300 drone types by RF protocol signature.
#       Average detection range 1,600 m; maximum up to 5,000 m in ideal conditions.
#       Integrated LTE for cloud connectivity (DedroneCity network).

name: Dedrone DedroneSensor RF-160
type: RF

max_range_m: 5000.0          # confidence: medium — datasheet maximum; typical/average is 1,600 m; highly environment-dependent
min_range_m: 0.0             # confidence: high — passive sensor; no minimum range
azimuth_coverage_deg: 360.0  # confidence: high — omnidirectional antenna; 360° coverage; no direction finding
elevation_coverage_deg: 90.0 # confidence: medium — hemispherical RF coverage; estimated for passive RF
elevation_boresight_deg: 45.0 # confidence: low — upward-biased for airborne targets; estimated
frequency_bands:             # confidence: medium — primary ISM bands stated; advanced config adds out-of-band detection
  - "2.4 GHz"
  - "5.8 GHz"
requires_los: false          # confidence: high — passive RF; signal diffracts around terrain obstacles
mounting_height_m: 5.0       # confidence: medium — pole/mast mount; not specified in datasheet
vegetation_penetration: 0.9  # confidence: medium — passive RF at ISM frequencies penetrates vegetation well
cost_aud: null               # confidence: N/A — not publicly disclosed; ~$11,500 USD estimated from 2024 reference
