# QinetiQ AUDS (Advanced Urban Defence System) — X-band FMCW Radar
# Source: Blighter Surveillance Systems (AUDS partner) datasheet; QinetiQ product page
# Last updated: 2026-04-10
# Note: AUDS is a layered counter-UAS system; the radar component is a Blighter B400
#       series AESA radar. Detection range is against Group 1 UAS (0.01 m² RCS).
#       The full AUDS system also includes EO/IR and RF effector; this entry covers
#       the radar detection sensor only.

name: QinetiQ AUDS Radar
type: Radar

max_range_m: 3600.0          # confidence: high — Blighter B400 published 3.6 km detection range for micro-UAS
min_range_m: 5.0             # confidence: high — Blighter AESA; published 5 m minimum range
azimuth_coverage_deg: 180.0  # confidence: high — published 180° single-panel coverage; deployable in pairs for 360°
elevation_coverage_deg: 30.0 # confidence: high — Blighter published ±15° elevation coverage (30° total)
elevation_boresight_deg: 0.0 # confidence: medium — horizontal boresight assumed; not explicitly stated
frequency_bands:             # confidence: high — E/F-band (2.4 GHz radar emission) published for Blighter B400; note: radar emission band, not RF-passive detection
  - "2.4 GHz radar (E/F-band)"
requires_los: true           # confidence: high — radar requires direct LOS
mounting_height_m: 3.0       # confidence: medium — tripod/mast mount; typical deployment height
vegetation_penetration: 0.5  # confidence: medium — S/C-band (2.4 GHz) better foliage penetration than X-band; estimated
cost_aud: null               # confidence: N/A — not publicly disclosed
