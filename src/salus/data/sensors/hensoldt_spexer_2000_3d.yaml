# HENSOLDT Spexer 2000 3D MkIII — X-band AESA Radar (long-range cUAS / GBAD)
# Source: HENSOLDT product datasheet / Resources/Sensors/Radar/hensoldt_spexer_2000_3d.md
# Last updated: 2026-04-12
# Note: Detection range published against "small UAV" (0.2 m² RCS) at 9 km.
#       Per-panel deployment: 120° azimuth, 90° elevation. Four panels give 360° coverage.
#       Key component of HENSOLDT XPELLER and Elysion C-UAS systems.

name: HENSOLDT Spexer 2000 3D MkIII
type: Radar

max_range_m: 9000.0          # confidence: high — datasheet: 9 km against small UAV (0.2 m² RCS)
min_range_m: 50.0            # confidence: medium — pulsed AESA; estimated minimum, not published
azimuth_coverage_deg: 120.0  # confidence: high — datasheet: 120° per panel; 360° with 4 panels
elevation_coverage_deg: 90.0 # confidence: high — datasheet: 90° per panel
elevation_boresight_deg: 41.5 # confidence: medium — centre of estimated -2° to +85° arc
frequency_bands:             # confidence: high — 9.2–10 GHz published; centre frequency estimated
  - "9.6 GHz"
requires_los: true           # confidence: high — radar requires direct LOS to target
mounting_height_m: 5.0       # confidence: medium — mast/vehicle typical; not specified in datasheet
vegetation_penetration: 0.2  # confidence: medium — X-band (9.6 GHz) heavily attenuated by dense foliage; 0.2 for dense canopy
cost_aud: null               # confidence: N/A — not publicly disclosed
