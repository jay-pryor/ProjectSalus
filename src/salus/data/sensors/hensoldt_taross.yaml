# HENSOLDT TAROSS — EO/IR Target Acquisition Turret (vehicle-mounted)
# Source: HENSOLDT product datasheet / Resources/Sensors/EO_IR/hensoldt_taross.md
# Last updated: 2026-04-12
# Note: Three variants (Short/Medium/Long Range) — this YAML uses the medium-range
#       specification as representative. Short/Medium range use uncooled LWIR;
#       Long range uses cooled MWIR for higher performance. All variants include
#       laser rangefinder and are NGVA-ready. Lightweight (9–12 kg) for small vehicles.
#       Detection range against UAS estimated — no UAS-specific range published.

name: HENSOLDT TAROSS
type: EO_IR

max_range_m: 5000.0          # confidence: low — target acquisition range estimated; UAS-specific range not published; medium-range variant assumed
min_range_m: 0.0             # confidence: medium — no stated minimum
azimuth_coverage_deg: 360.0  # confidence: medium — targeting turret; continuous rotation assumed
elevation_coverage_deg: 90.0 # confidence: medium — estimated -10° to +80° = 90° arc for vehicle-mounted turret
elevation_boresight_deg: 35.0 # confidence: low — centre of estimated -10° to +80° arc
frequency_bands:             # confidence: high — full HD daylight + LWIR (uncooled) on all variants; long range adds MWIR (cooled)
  - "visible"
  - "8–14 µm LWIR"
requires_los: true           # confidence: high — EO/IR requires direct optical LOS to target
mounting_height_m: 3.0       # confidence: medium — vehicle-mounted; typical vehicle height estimated
vegetation_penetration: 0.1  # confidence: high — optical/IR cannot penetrate foliage; near-zero penetration
cost_aud: null               # confidence: N/A — not publicly disclosed
