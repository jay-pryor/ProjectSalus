# Dedrone DroneTracker RF-400 — Passive RF Detection Sensor
# Source: Dedrone product datasheet / public marketing materials
# Last updated: 2026-04-10
# Note: The RF-400 is a passive multi-antenna RF sensor monitoring 433 MHz – 6 GHz.
#       Detection range is highly environment-dependent; 400 m is a conservative
#       indoor-adjacent figure; outdoor range can exceed 1 km in low RF noise environments.

name: Dedrone DroneTracker RF-400
type: RF

max_range_m: 1000.0          # confidence: medium — Dedrone states up to 1 km outdoor detection; environment-dependent
min_range_m: 0.0             # confidence: high — passive sensor; no minimum range
azimuth_coverage_deg: 360.0  # confidence: high — omnidirectional antenna array; 360° published
elevation_coverage_deg: 90.0 # confidence: medium — hemispherical RF coverage; estimated for passive RF
elevation_boresight_deg: 45.0 # confidence: low — upward-biased for airborne targets; estimated
frequency_bands:             # confidence: high — published: 433 MHz, 900 MHz, 1.2 GHz, 2.4 GHz, 5.8 GHz
  - "433 MHz"
  - "900 MHz"
  - "1.2 GHz"
  - "2.4 GHz"
  - "5.8 GHz"
requires_los: false          # confidence: high — passive RF; NLOS detection possible (RF diffracts around obstacles)
mounting_height_m: 3.0       # confidence: medium — pole/building mount; typical height
vegetation_penetration: 0.9  # confidence: medium — passive RF at low frequencies penetrates vegetation well; 0.9 estimated
cost_aud: null               # confidence: N/A — not publicly disclosed
