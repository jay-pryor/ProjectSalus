# HENSOLDT Spexer 360 — X-band Rotating Radar (perimeter ground surveillance)
# Source: HENSOLDT product datasheet / Resources/Sensors/Radar/hensoldt_spexer_360.md
# Last updated: 2026-04-12
# Note: Detection range published against micro-UAV (0.03 m² RCS). Mechanically rotating
#       radar with 4° azimuth beamwidth; 360° coverage from a single unit.

name: HENSOLDT Spexer 360
type: Radar

max_range_m: 1600.0          # confidence: high — datasheet: 1,600 m against micro-UAV (0.03 m² RCS)
min_range_m: 20.0            # confidence: medium — pulsed radar; estimated minimum, not published
azimuth_coverage_deg: 360.0  # confidence: high — mechanically rotating; full 360° from single unit
elevation_coverage_deg: 22.0 # confidence: high — datasheet: 22° -3dB beamwidth
elevation_boresight_deg: 9.0 # confidence: medium — centre of estimated -2° to +20° arc
frequency_bands:             # confidence: medium — X-band pulsed coherent stated; centre frequency estimated
  - "9.5 GHz"
requires_los: true           # confidence: high — radar requires direct LOS to target
mounting_height_m: 5.0       # confidence: medium — typical mast/pedestal; not specified in datasheet
vegetation_penetration: 0.2  # confidence: medium — X-band (9.5 GHz) attenuated by dense foliage; 0.2 for dense canopy
cost_aud: null               # confidence: N/A — not publicly disclosed
