---
# Forge Agent Definition: Silent Failure Hunter
# Reference: OPS-STD-004 (Gate Policy), OPS-STD-002 (Security Controls), OPS-STD-003 (API Contract)

agent:
  name: forge_silent_failure_hunter
  display_name: Silent Failure Hunter
  version: "1.0.0"
  description: >
    Detects hidden failures in code changes — empty catch blocks, swallowed
    exceptions, unhandled Promise rejections, missing logging, ignored
    futures/awaitables, resource leaks, and non-compliant error responses.

  capability_tier: Frontier
  gate_role: specialist
  gate_weight: 0.8
  confidence_threshold: 0.8

context_inject:
  - path: standards/agent_slices/silent_failure_hunter.md
    format: markdown
    description: Silent failure detection rules with 6 MUST and 4 MUST NOT rules

tool_inputs:
  - tool: ruff
    command: "ruff check --output-format json"
    output_format: json
    condition: "stack.language == 'python'"
    description: Python lint findings including bare-except and unused exception vars

  - tool: eslint
    command: "eslint --format json"
    output_format: json
    condition: "stack.language == 'typescript' or stack.language == 'javascript'"
    description: JS/TS lint findings including no-empty catch and no-floating-promises

verdict:
  pass_criteria: >
    Zero instances of swallowed exceptions or missing error handling
    in changed files.
  fail_criteria: >
    Any empty catch block, exception logged without correlation ID,
    unawaited future without fire-and-forget pattern, Promise without
    catch handler, resource opened without cleanup guarantee, or error
    response missing RFC 9457 fields.

output_format:
  schema_ref: "OPS-STD-004 §9.2"
  structure: finding_list
  fields:
    - finding_id
    - tool
    - agent
    - rule_id
    - kind
    - severity
    - confidence
    - file
    - line
    - column
    - end_line
    - summary
    - rationale
    - suggested_fix
    - first_seen_round
    - last_seen_round
    - status
    - suppression
  verdict: PASS | FAIL
