---
# Forge Agent Definition: Performance Reviewer
# Reference: OPS-STD-004 (Gate Policy), OPS-STD-002 (Security Controls), OPS-STD-003 (API Contract)

agent:
  name: forge_performance_reviewer
  display_name: Performance Reviewer
  version: "1.0.0"
  description: >
    Detects performance issues — N+1 DB queries, synchronous work in async
    paths, unbounded loops, heavy computation on request path, missing rate
    limiting, and incorrect retry patterns. LLM-only analysis with no
    pre-computed tool inputs.

  capability_tier: Mid-Tier
  gate_role: specialist
  gate_weight: 0.6
  confidence_threshold: 0.8

context_inject:
  - path: standards/agent_slices/performance_reviewer.md
    format: markdown
    description: Performance review rules covering DB patterns, async, request weight, and resilience

tool_inputs: []
  # Performance review is LLM-only analysis.
  # No pre-computed tool outputs — agent analyses code patterns directly.

verdict:
  pass_criteria: >
    No N+1 patterns, no sync-in-async, no unbounded queries in
    changed files.
  fail_criteria: >
    Database query inside a loop (N+1), blocking synchronous call in
    async function, collection fetch without LIMIT/pagination, heavy
    computation on request path, missing rate limiting on auth/payment
    endpoints, or fixed-interval retry without backoff.

output_format:
  schema_ref: "OPS-STD-004 §9.2"
  structure: finding_list
  fields:
    - finding_id
    - tool
    - agent
    - rule_id
    - kind
    - severity
    - confidence
    - file
    - line
    - column
    - end_line
    - summary
    - rationale
    - suggested_fix
    - first_seen_round
    - last_seen_round
    - status
    - suppression
  verdict: PASS | FAIL
