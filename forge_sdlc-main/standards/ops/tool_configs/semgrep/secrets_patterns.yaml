rules:
  # APP-SECRETS-01: Hardcoded API keys in source (secrets MUST NOT appear in source code)
  - id: hardcoded-api-key-assignment
    patterns:
      - pattern-either:
          - pattern: $VAR = "sk-..."
          - pattern: $VAR = "pk-..."
          - pattern: $VAR = "api_..."
          - pattern: $VAR = "key_..."
      - metavariable-regex:
          metavariable: $VAR
          regex: .*(api_key|apikey|api_secret|secret_key).*
    message: >
      Possible hardcoded API key detected in variable assignment.
      Use environment variables or a secrets manager instead.
      Reference: OPS-STD-002 APP-SECRETS-01.
    severity: ERROR
    languages: [python]
    metadata:
      control_id: APP-SECRETS-01
      standard: OPS-STD-002
      category: security
      subcategory: hardcoded-secrets
      confidence: MEDIUM

  # APP-SECRETS-01: Hardcoded password strings
  - id: hardcoded-password-assignment
    patterns:
      - pattern: $VAR = "..."
      - metavariable-regex:
          metavariable: $VAR
          regex: .*(password|passwd|pwd|db_pass|db_password).*
      - pattern-not: $VAR = ""
    message: >
      Possible hardcoded password detected. Use environment variables
      or a secrets manager for all credentials.
      Reference: OPS-STD-002 APP-SECRETS-01.
    severity: ERROR
    languages: [python]
    metadata:
      control_id: APP-SECRETS-01
      standard: OPS-STD-002
      category: security
      subcategory: hardcoded-secrets
      confidence: MEDIUM

  # APP-SECRETS-01: Hardcoded token strings
  - id: hardcoded-token-assignment
    patterns:
      - pattern: $VAR = "..."
      - metavariable-regex:
          metavariable: $VAR
          regex: .*(token|auth_token|access_token|refresh_token|bearer).*
      - pattern-not: $VAR = ""
    message: >
      Possible hardcoded token detected. Use environment variables
      or a secrets manager for all credentials.
      Reference: OPS-STD-002 APP-SECRETS-01.
    severity: ERROR
    languages: [python]
    metadata:
      control_id: APP-SECRETS-01
      standard: OPS-STD-002
      category: security
      subcategory: hardcoded-secrets
      confidence: MEDIUM

  # APP-SECRETS-01: Hardcoded secrets in JavaScript/TypeScript
  - id: hardcoded-secret-js
    patterns:
      - pattern-either:
          - pattern: const $VAR = "..."
          - pattern: let $VAR = "..."
          - pattern: var $VAR = "..."
      - metavariable-regex:
          metavariable: $VAR
          regex: .*(api_key|apiKey|API_KEY|secret|SECRET|password|PASSWORD|token|TOKEN|auth).*
      - pattern-not: const $VAR = ""
      - pattern-not: let $VAR = ""
      - pattern-not: const $VAR = process.env.$ENV
      - pattern-not: let $VAR = process.env.$ENV
    message: >
      Possible hardcoded secret in JavaScript/TypeScript source. Use
      environment variables (process.env) or a secrets manager instead.
      Reference: OPS-STD-002 APP-SECRETS-01.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      control_id: APP-SECRETS-01
      standard: OPS-STD-002
      category: security
      subcategory: hardcoded-secrets
      confidence: MEDIUM

  # APP-SECRETS-02: .env file copied into Docker image (this IS APP-SECRETS-02 — .env in .gitignore)
  - id: dockerfile-copy-env-file
    patterns:
      - pattern-either:
          - pattern: COPY .env ...
          - pattern: COPY .env.* ...
          - pattern: ADD .env ...
          - pattern: ADD .env.* ...
    message: >
      .env file is being COPY'd or ADD'd into a Docker image. This
      bakes secrets into the image layer. Use Docker secrets, build
      args with --secret, or runtime environment injection instead.
      Reference: OPS-STD-002 APP-SECRETS-02.
    severity: ERROR
    languages: [dockerfile]
    metadata:
      control_id: APP-SECRETS-02
      standard: OPS-STD-002
      category: security
      subcategory: hardcoded-secrets
      confidence: HIGH

  # APP-SECRETS-01: Hardcoded connection strings
  - id: hardcoded-connection-string
    patterns:
      - pattern-either:
          - pattern: $VAR = "postgresql://..."
          - pattern: $VAR = "postgres://..."
          - pattern: $VAR = "mysql://..."
          - pattern: $VAR = "redis://..."
          - pattern: $VAR = "mongodb://..."
          - pattern: $VAR = "amqp://..."
    message: >
      Hardcoded database or service connection string detected.
      Connection strings contain credentials and must be loaded from
      environment variables or a secrets manager.
      Reference: OPS-STD-002 APP-SECRETS-01.
    severity: ERROR
    languages: [python]
    metadata:
      control_id: APP-SECRETS-01
      standard: OPS-STD-002
      category: security
      subcategory: hardcoded-secrets
      confidence: HIGH
