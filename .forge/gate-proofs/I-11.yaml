task_id: I-11
title: "Restore terrain fidelity and solid appearance in the interactive interface"
timestamp: 2026-05-11T12:30:00Z

scope: |
  Triage surfaced via running `salus interface --scenario demo/explore/E01_dramatic_terrain/scenario.yaml`:
  the DEM rendered noticeably coarser than the older standalone `salus viewer` export, and the
  hillshade looked semi-translucent because the page body bled through.

  Three issues, fixed together:
    1. _compute_zoom_levels in interface_api/app.py hard-capped max_zoom at 13 regardless of DEM
       resolution and extent. For a 5 m DEM the ideal zoom is ~15; the cap quartered the linear
       resolution versus the older standalone exporter (_TERRAIN_MAX_ZOOM = 16). Replaced with a
       tile-budget walk-down: max_zoom_ideal capped at _TERRAIN_MAX_ZOOM_CAP=16, walked down until
       total tiles ≤ _TERRAIN_TILE_BUDGET=500. Two call sites updated to pass bounds.
    2. shell.js MapLibre style was empty (sources={}, layers=[]) and #map had no CSS background,
       so the dark-navy body bled through any unshaded hillshade pixel. Extracted initialMapStyle()
       factory returning one opaque background layer (#1a1a2e). bootstrap() consumes the factory.
    3. terrain-loader hillshade paint used #473B24 with no explicit highlight or illumination
       anchor. Updated to match the standalone viewer's high-contrast preset (#1a1a2e shadow,
       white highlight, viewport illumination anchor).

