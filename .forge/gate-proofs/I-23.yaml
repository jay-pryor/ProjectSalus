notes:
  - Source — coordinate-tools feature (2026-05-18), task 4 of 4. Builds on I-20 (toolbar + shell-owned subsystem), I-21 (origin + live readout) and I-22 (measurement). This task completes the four-task coord-tools feature.
  - Maths — `localXYToLngLat({x,y}, origin)` is the inverse of `lngLatToLocalXY`, exported and unit-tested directly (round-trip within 1e-9 deg for sample lng/lats). `clampGridSpacing(value)` clamps to [10, 5000] with a NaN-safe fall back to the default 100, also exported and unit-tested.
  - Grid generation — the grid is generated in the local tangent plane (so the spacing is exactly uniform in metres), then each line is emitted as a GeoJSON LineString in geographic coordinates, clipped to the terrain rectangle in lng/lat space. Constant-X lines run N–S at lng = xToLng(xk); constant-Y lines run E–W at lat = yToLat(yk). The X=0 and Y=0 lines (which always exist when the origin lies inside the bounds because 0 is a multiple of every spacing) are filtered into a separate `coord-tools:grid-axes` layer with thicker, brighter paint than the minor `coord-tools:grid` layer.
  - Reactivity — toggle on/off renders/removes; spacing change regenerates when on; terrain (re)load regenerates against new bounds (D-619 ordering fix ensures the in-watch _setOrigin sees the new bounds); origin move regenerates via the I-21 `_setOrigin` hook; clearing terrain disables both controls and tears down any rendered grid.
  - Defence in depth — bounds shape validation (D-617), pole-anchored origin guard (cosLat0 == 0), line-count safety cap (GRID_MAX_LINES_PER_AXIS = 10_000, sized to admit a 50 km × 50 km cUAS site at the 10 m minimum spacing while catching pathologically corrupt bounds), per-target try/catch on remove (D-620), rollback on failed render (D-618), empty-input rejection on the spacing field (D-616), and pre-toggle spacing flush (D-621).
  - Deferred (out of scope for I-23) — the terrain watch unconditionally re-defaults the origin to the new centre on every terrain (re)load, silently discarding a user-modified origin. This is pre-existing I-21 watch behaviour (untouched by I-23). Worth revisiting in a future task; not blocking and not introduced here.
