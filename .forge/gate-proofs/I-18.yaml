notes:
  - Source — user-reported viewer bug (2026-05-16): rendered terrain disappears whenever a non-map module panel (e.g. the library browser) is opened. Not present in the open defect register before this task.
  - Root cause — mode-manager.activateModule runs the outgoing module's runUnmount() on every navigation; terrain-loader's onUnmount called _cleanupMapLayers, removing the terrain source/hillshade/3D canvas. Non-map modules never restored it.
  - The two onUnmount-teardown tests removed in this task encoded the bug (they asserted removeLayer/removeSource/setTerrainSource(null) on unmount). Replacing them with persistence assertions is a deliberate test correction, confirmed legitimate by the regression-reviewer.
  - D-594 is pre-existing and out of scope for I-18 (terrain-canvas persistence) — logged as deferred for a dedicated follow-up.
  - Commit hash for D-592/D-593 and this gate-proof is backfilled in a follow-up chore commit, matching the I-14..I-17 pattern on this branch.

