notes: |
  I-1 fixes 3D terrain not rendering in the interactive viewer.

  Root cause: the salus:// protocol handler returned new ArrayBuffer(0) for tiles
  outside the DEM extent. When the map is pitched at 50°, MapLibreGL requests tiles
  at the horizon beyond the site boundary. An empty ArrayBuffer is not a valid PNG;
  the raster-dem decoder fails and silently disables terrain for the entire source.

  Fixes:
  - Embedded a pre-computed 256×256 flat Terrarium PNG (R=128,G=0,B=0 = 0m elevation,
    757 bytes / 1012 chars base64) as a module-level constant.
  - Protocol handler now returns flatBuffer.slice(0) for out-of-extent tiles.
  - Startup decode wrapped in try/catch with console.error fallback (D-274).
  - Per-tile decode path wrapped in try/catch with explicit reject(err) (D-276).
  - fitBounds now explicitly passes pitch:50,bearing:0 to prevent reset on fitBounds.
  - Terrain exaggeration raised 1.5→2.0 for clearer relief on modest terrain.
  - Fixed pre-existing thresh undefined in renderSaturationChart (D-275).

  Only JavaScript was changed; Python test suite (1243 tests) unaffected.
