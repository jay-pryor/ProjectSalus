task_id: I-10
title: "Auto-load pre-generated terrain session in the interactive interface"
timestamp: 2026-05-10T05:30:00Z

scope: |
  Bug surfaced by manually firing up the interface against the
  E01_dramatic_terrain demo: salus interface --scenario pre-generates terrain
  tiles via pregen_terrain_from_path() but the JS shell has no way to discover
  the session at startup, so the user sees an empty map.

  Fix:
  - Backend: new GET /api/terrain/sessions/latest endpoint returning the same
    metadata shape as POST /api/terrain/load, or 404 (no session / errored
    session).
  - Frontend: terrain-loader/init() now calls _adoptLatestSessionIfAvailable
    when api.state.get('terrain') is null, and on success writes terrain state,
    emits terrain:loaded, applies map layers, and fits bounds. Strict metadata
    validation, race-cancellation, and unmount-cancellation guards were added
    after the L2 review of the initial implementation.

