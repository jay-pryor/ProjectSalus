notes:
  - Source — user feature request (2026-05-18): a coordinate system for the viewer (cursor readout, resettable origin, distance measurement, toggleable grid), scoped as a four-task feature (I-20 infrastructure, I-21 origin+readout, I-22 measurement, I-23 grid). I-20 builds the shared infrastructure only — no user-facing tool behaviour.
