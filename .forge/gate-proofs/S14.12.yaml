  - module_architecture_reviewer: isolation, state contract, reactive
    reads, event contract, map layer scoping, onUnmount cleanup all
    verified. Two low findings (document-level drag listeners; direct
    fetch usage matching existing modules) accepted.

  Integration defects (D-404, D-405) found after L2 review:
  - Separate from S14.12's module code; both are in /api/simulate and
    predate S14.12. Without them fixed, S14.12's overlay and swipe modes
