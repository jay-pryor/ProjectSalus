notes: >
  Scenario Comparison module (S14.12) delivered covering all three sub-tasks
  (S14.12-1 manifest+panel+file-loading, S14.12-2 overlay diff + /api/compare,
  and S14.12-3 swipe divider + scenario B sensors + rolling summary).

  Backend:
  - Added POST /api/compare with CompareRequest/CompareResponse models and
    Shapely-backed spatial diff (_geometries_from_features,
    _geometry_to_feature_collection). Handles empty, disjoint, identical,
    and malformed inputs; invalid geometries are skipped after buffer(0)
    cleanup rather than appended raw (D-403).
  - Fixed D-404 (critical): _sse_event was emitting "data: {...}\n\n" with no
    event: line, so the JS parsers dispatched everything as 'message' and
    silently dropped progress/complete/error events. Now emits
    "event: {type}\ndata: {json}\n\n". Added test_simulate_sse_events_carry_event_line
    regression test.
  - Fixed D-405 (critical): _run_simulate_pipeline emitted the report
    SimResultsPayload shape (top-level total_coverage_pct, base64 PNGs) but
    the interface modules expect the interface schema (layers,
    sensor_placements, stats) defined in InterfaceArchitecture.md §3.
    Rewrote the pipeline to build a SimulationResults and call
    export_viewer_data(skip_terrain_tiles=True). Added the
    skip_terrain_tiles kwarg to export_viewer_data (terrain is served via
    /api/terrain on the live interface; tile generation doesn't belong in
    the SSE stream). Removed the now-dead PNG rendering code
    (_render_to_b64_api, _build_minimal_assumptions). stats dict exposes
    both naming variants (coverage_pct / total_coverage_pct and
    largest_gap_area_m2 / largest_contiguous_gap_m2) so every consumer
    (simulation-runner, coverage-viewer, scenario-comparison) finds its
    expected key.

  Frontend (modules/scenario-comparison/):
  - manifest.json declares reads:[terrain, sim_results],
    writes:[scenario_b_sim_results], emits:[comparison:loaded].
  - index.js: panel (file picker, loaded indicator, summary table, mode
    selector, diff-layer toggles, swipe summary), seven map sources and
    seven prefixed map layers, DOM divider with document-level drag
    handlers, full onUnmount teardown.
  - File parsing uses regex + JSON.parse (not eval) to avoid
    arbitrary-code execution on user-selected files.
  - _coveragePct / _largestGap fallback chains updated to read both
    naming variants so the module works with either viewer_data.js (B)
    or live /api/simulate (A).

  L2 review findings (S14.12 module itself):
  - silent_failure_hunter: 5 medium findings fixed before commit
    (D-399 watchdog timeout added; D-400 failure branch no longer
    overwrites diff sources with empty FCs; D-401 abort swallows replaced
