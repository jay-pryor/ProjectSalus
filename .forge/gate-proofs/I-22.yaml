notes:
  - Source — coordinate-tools feature (2026-05-18), task 3 of 4. Builds on I-20 (toolbar + shell-owned subsystem) and I-21 (origin + live readout); adds the two-point measurement tool and the cross-module mutex via a new drawmode:entered / drawmode:exited bus event contract.
  - Measurement maths — `measurePair(a, b, origin, zA, zB)` is exported as a pure function, unit-tested directly. Returns dx/dy in the I-21 local tangent plane (so the existing lngLatToLocalXY constants EARTH_RADIUS_M / DEG_TO_RAD do double duty), dz, 2D horizontal (Math.hypot(dx, dy)), and 3D slant (Math.hypot(dx, dy, dz)). When either endpoint's elevation is unavailable, hasZ is false and dz/slant3d are null — the readout's "Z unavailable" branch labels the headline 2D.
  - Map layers — single GeoJSON source (coord-tools:measure-source) with two $type-filtered layers (coord-tools:measure-line filter LineString, coord-tools:measure-points filter Point), matching the threat-corridor-editor source/layer pattern called out in the design. All three IDs are coord-tools-prefixed, enforced by the shell-built scoped map proxy.
  - Cross-module mutex — VALID_EVENTS gains drawmode:entered / drawmode:exited. Each of the three modules with click-capturing draw modes (library-browser click-to-place, zone-editor draw + vertex-edit, threat-corridor-editor draw + waypoint-edit + protected-point-pick) declares the events in its manifest emits[] and emits the pair around its capture-mode lifecycle, with the entered emit always preceding the cursor write (D-613). The coord-tools subsystem subscribes via a shell-granted subscribe-only `bus.on` handle and tracks a depth counter so overlapping module modes (e.g. tce edit → draw) still keep the Measure and Set-origin toggles disabled until the last exit. The depth counter clamps at 0 with a one-time warn (D-616) so an unbalanced exited surfaces once rather than being silently masked.
  - Origin-pick mutex (D-612) — silent-failure review identified that origin-pick is structurally the same kind of click-capturing single-handler mode as Measure, so the same mutex now applies: handleDrawModeEntered exits pickMode as well as measureMode, and originBtn is disabled together with measureBtn while drawModeDepth > 0.
  - Within the subsystem, the pick and measure modes mutex with each other (entering one exits the other) so a single click is never consumed by both. The map click listener is registered once at startup and branches on mode flags rather than being attached/detached per mode — functionally equivalent to AC 6's wording (spec_compliance informational note).
  - Disposal — both bus subscriptions are unsubscribed, the measure layers + source are removed (idempotent remove-then-add), the cursor is restored if a pick or measure was in progress, and the toolbar DOM is detached. The disposed flag still gates a late requestAnimationFrame callback.
