notes: >
  All High and Medium defects resolved before commit.

  D-069 (HIGH): Unguarded dict key lookup — replaced _ZONE_STYLE[zone.zone_type]
  with .get(); emits UserWarning and continues loop for unknown zone types.
  Test added (test_unknown_zone_type_warns_and_skips).

  D-070 (HIGH): geom.exterior None guard — added `if geom.exterior is None: continue`
  before .xy access to handle degenerate polygons.

  D-071 (HIGH): NaN centroid guard — added `if not (np.isnan(cx) or np.isnan(cy))`
  before ax.text(); label silently skipped for degenerate zero-area geometries.

  D-072 (MEDIUM): Geometry type assumption — replaced implicit else with
  `elif isinstance(zone.geometry, Polygon)`; added else branch with UserWarning
  for unsupported geometry types (e.g. GeometryCollection).

  D-073 (MEDIUM): ax.legend() unprotected — wrapped in try/except Exception;
  emits UserWarning on failure; map is saved without legend rather than failing.

  D-074 (MEDIUM): ax.fill() hatch suppression — changed from color= to separate
  facecolor= and edgecolor= kwargs to guarantee hatch visibility across all
  Matplotlib versions. Fixes spec requirement "exclusion zones hatched".

  spec-compliance "error" — ZoneType.inner in _ZONE_STYLE is not scope creep:
  inner IS a defined ZoneType in the project model. Not including it would cause
  a KeyError for any site with inner zones. Styling all known enum values is
  correct defensive practice. The .get() guard now also protects against any
  future ZoneType members.

  spec-compliance "warning" (hatch visibility): Fixed via D-074.

  G4 (mypy): All errors are pre-existing import-untyped warnings for third-party
  libraries. No new type errors introduced.

  G6 (17 pre-existing failures): All PROJ database environment failures unrelated
  to S3-5.
