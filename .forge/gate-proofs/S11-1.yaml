notes: >
  New module src/salus/engine/effector_coverage.py implements:
  (1) viewshed-based engagement zones for LOS-required effectors (Kinetic/DE),
  (2) range-circle zones for non-LOS effectors (RF jammers/Cyber),
  (3) clipping to [min_range_m, max_range_m] and engagement arc,
  (4) layer union via compute_effector_layer_coverage.
  The GDAL ViewshedGenerate clips its output raster when max_range is passed,
  so _los_engagement_zone intentionally omits max_range; range clipping is
  deferred to _clip_to_effector (consistent with the sensor dispatcher pattern).
