notes: >
  D-099 (HIGH): Invalid Shapely geometries from rasterio silently accepted — is_valid=False
  polygons corrupt downstream area/union operations. Fixed: buffer(0) repair applied before
  is_empty/is_valid check; only valid non-empty polygons appended to polys.
  Test: test_invalid_geometry_repaired_not_silently_accepted.

  D-100 (HIGH): shapes() loop had no exception handler — mid-loop failure discarded partial
  polys and returned inconsistent GapAnalysis (area>0, polygons=None, no error).
  Fixed: wrapped loop in try/except Exception; re-raises as RuntimeError with raster shape
  and gap_cells count in message. Test: test_vectorisation_exception_raises_runtime_error
  (patches rasterio.features.shapes).

  D-101 (MEDIUM): Float arrays with NaN cast to bool count NaN as True, silently inflating
  gap counts. Fixed: dtype guard raises ValueError if gap_raster is floating and contains
  non-finite values. Test: test_nan_float_gap_raster_raises.

  D-102 (MEDIUM): All geometries empty after shapes loop → polys=[], gap_polygons=None
  despite gap_cells>0 — internally inconsistent result, no signal to caller.
  Fixed: warns.warn after loop if gap_cells>0 and polys=[].
  Test: test_empty_polys_with_gap_cells_warns (patches rasterio.features.shapes).

  spec_compliance: 0 findings. All three spec items satisfied — compute_composite_coverage,
  compute_gaps, and GapAnalysis (via build_gap_analysis) implemented exactly to spec.
  build_gap_analysis is not named in the spec but is required to materialise GapAnalysis;
  not scope creep.

  All 447 suite tests pass. G8 clean (no secrets detected).
