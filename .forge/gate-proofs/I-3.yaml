notes: |
  I-3 fixes 3D terrain rendering by replacing the custom salus:// addProtocol
  approach with HTTP-served tile files.

  Root cause of I-1 regression: MapLibreGL v3 fetches raster-dem tiles inside
  a Web Worker. addProtocol handlers registered on the main thread are not
  proxied to the worker for raster-dem sources. All terrain tile requests
  silently failed, MapLibreGL received no elevation data, and terrain rendered
  flat.

  Fix:
  - package_viewer now writes terrain tiles to output_dir/tiles/{z}/{x}/{y}.png
  - app.js uses tiles/{z}/{x}/{y}.png as the tile URL (standard HTTP, no custom protocol)
  - terrain property set in the initial MapLibreGL style object (canonical approach)
  - Hillshade layer included for visual depth cues
  - viewer_data.js no longer embeds terrain tile base64 (~2MB reduction in file size)
  - terrain_tile_count added to payload so app.js can conditionally enable terrain

  Additional improvements:
  - _write_terrain_tile_files guards against malformed keys and reports write failures
  - map.on('error') handler surfaces MapLibreGL errors in browser console
  - JSDoc comment updated to reflect removal of SALUS_TILES / salus:// protocol
