notes:
  - Source — user-reported viewer bug (2026-05-18): loading a DEM via the terrain-loader file input failed with "Error: SSE connection error during tile generation" although server-side tile generation succeeded (18 tiles written, session registered).
  - Root cause (D-595) — the backend's _sse_event formats every tile-progress event with a named 'event:' line (D-404); terrain-loader's _pollTileProgress consumed the stream with EventSource.onmessage, which fires only for unnamed 'message' events, so every progress/complete/error event was dropped and the stream's normal close surfaced via onerror as a false connection error.
  - No backend/server file was changed — _sse_event's named 'event:' line is the correct shared SSE contract (simulation-runner/optimiser already consume it). Only the terrain-loader client was out of step.
  - L2 review was run twice — silent_failure_hunter re-reviewed the rewritten _pollTileProgress after the first round of fixes and found D-601/D-602, which were then logged and fixed in turn.
  - Commit hash for D-594..D-602 and this gate-proof is backfilled in a follow-up chore commit, matching the I-14..I-18 pattern on this branch.

