  - id: D-406
    severity: critical
    task: I-6
    found_by: triage_sweep_2026-04-17
    file: src/salus/interface_api/app.py
    line: 145
    description: "BugTriage #9 — Global terrain session race condition. _terrain_session was a single global dict shared by every /api/terrain/load call. Two concurrent loads silently overwrote each other's tile_dir, dem_path, and SSE progress, and the losing load's temp tile_dir was never cleaned up. Symptom: a slow client's tile requests would silently start serving the second client's DEM."
    resolution: "Replaced _terrain_session with _terrain_sessions: dict[str, dict] keyed by session_id (timestamp-based id assigned per /api/terrain/load call). _run_tile_generation now updates per-session progress under the lock; metadata tile_url_template is session-qualified (/api/terrain/sessions/{session_id}/tiles/...). Added sessioned tile + tile-progress endpoints; legacy unqualified endpoints now resolve to the latest session via _resolve_terrain_session_id. Added test_terrain_concurrent_loads_keep_disjoint_tile_paths regression test."
    status: resolved
    commit: 9ecbe42

  - id: D-407
    severity: critical
    task: I-6
    found_by: triage_sweep_2026-04-17
    file: src/salus/interface_api/app.py
    line: 73
    description: "BugTriage #8 — Path traversal in /api/terrain/load and /api/simulate. ScenarioConfig.site_dem_path and OptimiserRequest.terrain accepted arbitrary filesystem paths with no directory restriction. A malicious or careless caller could read or open any file the server process has access to (e.g. /etc/passwd, scenario YAMLs from other tenants)."
    resolution: "Added _ALLOWED_DEM_DIRS allowlist (defaults to _TERRAIN_DATA_DIR; extensible via SALUS_ALLOWED_DEM_DIRS env var). _validate_dem_path resolves the path and rejects (HTTP 403) anything outside the allowlist; called from /api/simulate (site_dem_path, site_dsm_path, boundary_path) and /api/optimise (terrain). Added _register_allowed_dem_dir for pytest fixtures (autoused in conftest.py to register tmp_path + fixtures dir). Added test_simulate_rejects_path_outside_allowlist regression test."
    status: resolved
    commit: 9ecbe42

