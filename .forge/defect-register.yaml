    resolution: "Reworked /api/report to accept the UI report_config shape and the canonical placements/zones interface shapes (both old flat-list and new {sensors, effectors}/{priority, exclusion} accepted). Added _extract_sim_stats helper that handles both nested stats and legacy flat SimResultsPayload. ReportRequest fields are now permissive dicts; the backend reconstructs a minimal ScenarioConfig server-side from placements + a placeholder DEM path (render_pdf only needs scenario.sensor_placements + scenario.site_dem_path.stem). Replaced test_report_invalid_scenario_returns_422 with test_report_accepts_ui_report_config_without_dem_path to lock in the new permissive flow."
