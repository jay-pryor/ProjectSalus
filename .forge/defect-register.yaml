    description: "BugTriage #7 — sensor_library / effector_library never populated. No module wrote these state keys and the shell never called GET /api/sensors or GET /api/effectors. Result: library-browser rendered empty, budget-tracker calculated zero costs, and the optimiser found no sensors."
    resolution: "Shell now fetches /api/sensors and /api/effectors at startup and seeds sensor_library / effector_library via state.setState(). Failures fall back to an empty dict (not null) so library-browser renders cleanly with no entries rather than crashing on Object.entries(null)."
